aid: leap-legal
url: https://raw.githubusercontent.com/api-evangelist/leap-legal/refs/heads/main/apis.yml
name: LEAP
kind: company
description: LEAP is cloud-based legal practice management software for law firms,
  covering matter and contact management, document automation and court forms,
  time recording, billing, and trust accounting, tightly integrated with Microsoft
  365. LEAP operates a LEAP Developer Console and LEAP Marketplace
  (developer.leap.build / console.leap.build) through which approved third-party
  developers build REST-based integrations (an "API Reference" is versioned there,
  e.g. v1.0.4, v1.0.5), but the technical reference - endpoint paths, base URL,
  and authentication schema - sits behind developer registration and an app
  review process rather than a public, self-serve API reference. There is no
  publicly published OpenAPI document, public base URL, or anonymous API key
  signup. Existing Marketplace integrations (Xero, Zoom, InfoTrack, LawTap, and
  others) confirm the API surface is real and in production use, but its
  concrete shape is not publicly disclosed.
